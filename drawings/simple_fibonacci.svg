<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">Simple Fibonacci depiction</title>
  <desc id="desc">A minimal discrete Fibonacci sequence under the repository Fv convention, showing seed destinations 0, 1, 1 and later destinations made by adding the prior two.</desc>
  <rect width="820" height="260" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Fibonacci: each new destination adds the prior two</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Repository convention: Fv v is the process step; D_v is the destination value.</text>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(70 120)">
      <circle r="24" fill="#f3f4f6" stroke="#111827" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#111827">0</text>
      <text y="48" font-size="13" fill="#374151">Fv -1</text>
    </g>
    <g transform="translate(170 120)">
      <circle r="24" fill="#f3f4f6" stroke="#111827" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#111827">1</text>
      <text y="48" font-size="13" fill="#374151">Fv 0</text>
    </g>
    <g transform="translate(270 120)">
      <circle r="24" fill="#f3f4f6" stroke="#111827" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#111827">1</text>
      <text y="48" font-size="13" fill="#374151">Fv 1</text>
    </g>
    <g transform="translate(370 120)">
      <circle r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#1e3a8a">2</text>
      <text y="48" font-size="13" fill="#374151">Fv 2</text>
    </g>
    <g transform="translate(470 120)">
      <circle r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#1e3a8a">3</text>
      <text y="48" font-size="13" fill="#374151">Fv 3</text>
    </g>
    <g transform="translate(570 120)">
      <circle r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#1e3a8a">5</text>
      <text y="48" font-size="13" fill="#374151">Fv 4</text>
    </g>
    <g transform="translate(670 120)">
      <circle r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#1e3a8a">8</text>
      <text y="48" font-size="13" fill="#374151">Fv 5</text>
    </g>
    <g transform="translate(770 120)">
      <circle r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text y="7" font-size="20" font-weight="700" fill="#1e3a8a">13</text>
      <text y="48" font-size="13" fill="#374151">Fv 6</text>
    </g>
  </g>

  <g stroke="#6b7280" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 195 120 H 245"/>
    <path d="M 295 120 H 345"/>
    <path d="M 395 120 H 445"/>
    <path d="M 495 120 H 545"/>
    <path d="M 595 120 H 645"/>
    <path d="M 695 120 H 745"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">
    <text x="370" y="203">1 + 1 = 2</text>
    <text x="470" y="203">1 + 2 = 3</text>
    <text x="570" y="203">2 + 3 = 5</text>
    <text x="670" y="203">3 + 5 = 8</text>
    <text x="770" y="203">5 + 8 = 13</text>
  </g>

  <text x="410" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Question: show the sequence simply. Domain: exact mathematics. Boundary: finite destinations are shown; no ratio or phi-limit claim is made.</text>
</svg>
