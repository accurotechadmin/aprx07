<text x="780.0" y="482" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569" font-weight="400" text-anchor="middle">Fv process step v (discrete observations; bars use a zero baseline)</text><text x="420" y="520" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="400" text-anchor="start">Low hanging fruit: if Fv 0 and Fv 1 are both 1, then Fv 2 must be 2.</text><text x="420" y="550" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="400" text-anchor="start">Basic: Fv -1 is an address for destination 0; it prevents the zero from disappearing.</text><text x="420" y="580" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="400" text-anchor="start">Nuanced: equal destination does not mean equal process identity; the two 1s are separate seed events.</text>
<text x="600.0" y="878" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" font-weight="400" text-anchor="middle">Boundary: exact recurrence data and labeled finite views; the picture is not a continuous Fibonacci curve and not a proof that any finite ratio equals phi.</text>
