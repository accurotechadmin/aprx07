<text x="600.0" y="38" font-family="Inter, Arial, sans-serif" font-size="26" fill="#0f172a" font-weight="800" text-anchor="middle">Canonical Fv destinations — observation atlas</text>
<text x="600.0" y="64" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569" font-weight="500" text-anchor="middle">Full reference included; specialization gathers elementary, graduated, and advanced observations.</text>
<text x="40" y="108" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569" font-weight="700" text-anchor="start">Full canonical reference: Fv -1 through Fv 28 (D_v = F_(v+1))</text>
