<text x="271" y="346" font-family="Inter, Arial, sans-serif" font-size="11" fill="#0f172a" font-weight="400" text-anchor="start">Fv 28: 514229</text><text x="420" y="135" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="800" text-anchor="start">Observation cards across the four view horizons</text><rect x="420" y="175" width="710" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/><text x="440" y="201" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="800" text-anchor="start">Whole Fv 1-28</text><text x="440" y="229" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155" font-weight="400" text-anchor="start">Low: values grow by addition. Basic: fixed seeds + recurrence determine all destinations. Nuanced: 28 has D_v=514229 and 27-&gt;28 ratio is finite, not phi.</text><rect x="420" y="275" width="710" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/><text x="440" y="301" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="800" text-anchor="start">First 12</text><text x="440" y="329" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155" font-weight="400" text-anchor="start">Low: solve missing values one by one. Basic: D_12=233 from 89+144. Nuanced: late-looking closeness can hide side-of-limit alternation.</text><rect x="420" y="375" width="710" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/><text x="440" y="401" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="800" text-anchor="start">First 7</text><text x="440" y="429" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155" font-weight="400" text-anchor="start">Low: 1,1,2,3,5,8,13 is memorizable. Basic: each non-seed depends on two prior destinations. Nuanced: Fv labels differ from conventional F_n labels.</text><rect x="420" y="475" width="710" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/><text x="440" y="501" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="800" text-anchor="start">First 3 zoom</text><text x="440" y="529" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155" font-weight="400" text-anchor="start">Low: 1+1=2. Basic: Fv 0 and Fv 1 are distinct. Nuanced: Fv -1 -&gt; 0 is canonical, not decorative.</text>
<text x="600.0" y="878" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" font-weight="400" text-anchor="middle">Boundary: exact recurrence data and labeled finite views; the picture is not a continuous Fibonacci curve and not a proof that any finite ratio equals phi.</text>
</svg>