<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
<title id="title">Canonical Fv destinations — observation atlas</title>
<desc id="desc">Canonical Fibonacci Fv -1 through Fv 28 table with observation cards for whole, first-12, first-7, and first-3 views.</desc>
